services:
  - type: web
    name: owwa-inventory
    runtime: docker
    plan: free
    region: singapore
    branch: main
    healthCheckPath: /up
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://owwa-inventory.onrender.com
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_PORT
        value: "5432"
      - key: DB_SSLMODE
        value: require
      - key: SEED_DEMO
        value: "true"
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: QUEUE_CONNECTION
        value: database
      - key: CACHE_STORE
        value: database
      - key: BROADCAST_CONNECTION
        value: log
      - key: OLLAMA_URL
        value: http://127.0.0.1:11434
      - key: OLLAMA_EMBED_MODEL
        value: nomic-embed-text
      - key: OLLAMA_CHAT_MODEL
        value: deepseek-r1:7b
